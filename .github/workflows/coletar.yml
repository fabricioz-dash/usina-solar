name: Coleta diária PV Hub

on:
  schedule:
    # Roda todo dia às 20h (horário de Brasília = UTC-3, ou seja, 23:00 UTC)
    - cron: "0 23 * * *"
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Chrome headless (já incluso no ubuntu-latest)
      - name: Instalar ChromeDriver
        uses: browser-actions/setup-chrome@v1

      # 4. Dependências Python
      - name: Instalar dependências
        run: pip install selenium schedule

      # 5. Executar scraper (roda uma única coleta, sem o loop de agendamento)
      - name: Executar coleta
        env:
          PV_USUARIO: ${{ secrets.PV_USUARIO }}
          PV_SENHA:   ${{ secrets.PV_SENHA }}
        run: python scraper_pv_hub.py --uma-vez

      # 6. Commit do CSV atualizado (só se houver mudança)
      - name: Commitar CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rendimento_diario.csv
          git diff --cached --quiet || git commit -m "coleta: $(date +'%d/%m/%Y')"
          git push
